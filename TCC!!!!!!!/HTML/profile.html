<!DOCTYPE html>
<html lang="pt-br">
<!-- =======================================
Bloco: Metadados e Assets Globais
O que faz: Configura charset, viewport e importa ícones/CSS base
Como faz: Usa tags <meta>, <link> e define título e favicon
======================================= -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - Lifelet</title>
    <link rel="icon" href="../IMG/icone.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../CSS/profile.css">
</head>
<body>
    <!-- =======================================
    Bloco: Acesso rápido
    O que faz: Disponibiliza link fixo para a Home
    Como faz: Usa âncora posicionada no canto superior com estilo global
    ======================================= -->
    <a href="index.html" class="go-home-btn" title="Ir para a página inicial">
        <i class="fas fa-home"></i>
        Home
    </a>

    <!-- =======================================
    Bloco: Container principal
    O que faz: Agrupa header, informações do perfil e formulário de edição
    Como faz: Usa div .profile-container para centralizar e aplicar card
    ======================================= -->
    <div class="profile-container">
        <!-- Cabeçalho do perfil -->
        <!-- =======================================
        Bloco: Cabeçalho do card
        O que faz: Mostra logo e contextualiza a página
        Como faz: Exibe imagem e textos dentro do container com borda inferior
        ======================================= -->
        <div class="profile-header">
            <img src="../IMG/logo.png" alt="Lifelet Logo" class="logo-img">
            <h1>Meu Perfil</h1>
            <p>Gerencie suas informações pessoais</p>
        </div>

        <!-- Informações do perfil -->
        <!-- =======================================
        Bloco: Seção de informações
        O que faz: Exibe foto, nome e informações básicas do usuário
        Como faz: Grid com foto de perfil e dados principais
        ======================================= -->
        <div class="profile-info-section">
            <div class="profile-photo-section">
                <div class="profile-photo-wrapper">
                    <div id="profilePhotoPlaceholder" class="profile-photo-placeholder">
                        <i class="fas fa-user"></i>
                    </div>
                    <img src="" alt="Foto de perfil" id="profilePhoto" class="profile-photo" style="display: none;">
                    <button class="photo-edit-btn" id="photoEditBtn" title="Alterar foto">
                        <i class="fas fa-camera"></i>
                    </button>
                </div>
                <input type="file" id="photoInput" accept="image/*" style="display: none;">
            </div>

            <div class="profile-stats">
                <div class="stat-item">
                    <i class="fas fa-heartbeat"></i>
                    <div>
                        <span class="stat-value" id="totalReadings">0</span>
                        <span class="stat-label">Leituras</span>
                    </div>
                </div>
                <div class="stat-item">
                    <i class="fas fa-calendar-check"></i>
                    <div>
                        <span class="stat-value" id="daysActive">0</span>
                        <span class="stat-label">Dias ativos</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Formulário de edição -->
        <!-- =======================================
        Bloco: Formulário de edição de perfil
        O que faz: Permite editar informações pessoais do usuário
        Como faz: Exibe inputs validados e botão de salvar
        ======================================= -->
        <div class="form-container">
            <h2>
                <i class="fas fa-user-edit"></i>
                Informações Pessoais
            </h2>
            <form id="profileForm">
                <div class="form-group">
                    <label for="profileName">
                        <i class="fas fa-user"></i>
                        Nome Completo
                    </label>
                    <input type="text" id="profileName" name="name" placeholder="Seu nome completo" required>
                </div>

                <div class="form-group">
                    <label for="profileEmail">
                        <i class="fas fa-envelope"></i>
                        Email
                    </label>
                    <input type="email" id="profileEmail" name="email" placeholder="seu@email.com" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="profilePhone">
                            <i class="fas fa-phone"></i>
                            Telefone
                        </label>
                        <input type="tel" id="profilePhone" name="phone" placeholder="(00) 00000-0000">
                    </div>
                    <div class="form-group">
                        <label for="profileBirthDate">
                            <i class="fas fa-birthday-cake"></i>
                            Data de Nascimento
                        </label>
                        <input type="date" id="profileBirthDate" name="birthDate">
                    </div>
                </div>

                <div class="form-group">
                    <label for="profileType">
                        <i class="fas fa-user-tag"></i>
                        Tipo de Conta
                    </label>
                    <select id="profileType" name="accountType" disabled>
                        <option value="user">Usuário</option>
                        <option value="guardian">Responsável</option>
                    </select>
                    <small class="form-hint">O tipo de conta não pode ser alterado</small>
                </div>

                <div class="form-group">
                    <label for="profileBio">
                        <i class="fas fa-info-circle"></i>
                        Sobre você
                    </label>
                    <textarea id="profileBio" name="bio" placeholder="Conte um pouco sobre você..." rows="4"></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="submit-btn">
                        <i class="fas fa-save"></i>
                        Salvar Alterações
                    </button>
                    <a href="password.html" class="change-password-link">
                        <i class="fas fa-key"></i>
                        Alterar Senha
                    </a>
                </div>
            </form>
        </div>

        <!-- Seção de preferências -->
        <!-- =======================================
        Bloco: Configurações adicionais
        O que faz: Permite ajustar preferências do usuário
        Como faz: Cards com opções de configuração
        ======================================= -->
        <div class="preferences-section">
            <h2>
                <i class="fas fa-cog"></i>
                Preferências
            </h2>
            <div class="preferences-grid">
                <div class="preference-card">
                    <div class="preference-header">
                        <i class="fas fa-bell"></i>
                        <h3>Notificações</h3>
                    </div>
                    <p>Receber alertas sobre batimentos cardíacos</p>
                    <label class="toggle-switch">
                        <input type="checkbox" id="notificationsEnabled" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="preference-card">
                    <div class="preference-header">
                        <i class="fas fa-chart-line"></i>
                        <h3>Relatórios</h3>
                    </div>
                    <p>Enviar relatórios semanais por email</p>
                    <label class="toggle-switch">
                        <input type="checkbox" id="weeklyReportsEnabled">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast para notificações -->
    <!-- =======================================
    Bloco: Feedback visual
    O que faz: Mostra notificações de sucesso/erro
    Como faz: Usa div posicionada fixa atualizada via JS
    ======================================= -->
    <div class="toast" id="toastNotification" style="display: none;">
        <i class="fas fa-info-circle"></i>
        <span id="toastMessage">Mensagem</span>
    </div>

    <!-- =======================================
    Bloco: Scripts
    O que faz: Importa lógica de edição e validações
    Como faz: Carrega arquivo profile.js contendo listeners e integrações
    ======================================= -->
    <script src="../JS/profile.js"></script>
</body>
</html>
