<!DOCTYPE html>
<html lang="pt-br">
<!-- =======================================
Bloco: Metadados e Assets Globiais
O que faz: Configura charset, viewport e importa ícones/CSS base
Como faz: Usa tags <meta>, <link> e define título e favicon
======================================= -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Lifelet</title>
    <link rel="icon" href="../IMG/icone.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../CSS/login.css">
</head>
<body>
    <!-- =======================================
    Bloco: Acesso rápido
    O que faz: Disponibiliza link fixo para a Home após alternância de tema
    Como faz: Usa âncora posicionada no canto superior com estilo global
    ======================================= -->
    <!-- Botão de ir para Home no canto superior direito -->
    <a href="home.html" class="go-home-btn" title="Ir para a página inicial">
        <i class="fas fa-home"></i>
        Home
    </a>
    <!-- =======================================
    Bloco: Container principal
    O que faz: Agrupa header, formulário e alternâncias visuais
    Como faz: Usa div .login-container para centralizar e aplicar card
    ======================================= -->
    <div class="login-container">
        <!-- Logo e cabeçalho -->
        <!-- =======================================
        Bloco: Cabeçalho do card
        O que faz: Mostra logo e contextualiza a página
        Como faz: Exibe imagem e textos dentro do container com borda inferior
        ======================================= -->
        <div class="login-header">
            <img src="../IMG/logo.png" alt="Lifelet Logo" class="logo-img">
            <h1>Bem-vindo ao Lifelet</h1>
            <p>Sistema de Monitoramento de Batimentos Cardíacos</p>
        </div>

        <!-- Toggle entre Login e Registro -->
        <!-- =======================================
        Bloco: Seletor de modo
        O que faz: Alterna visualmente entre formulários de Login e Registro
        Como faz: Dois botões com data-mode controlam classes .active via JS
        ======================================= -->
        <div class="mode-toggle">
            <button class="toggle-btn active" id="loginToggle" data-mode="login">
                <i class="fas fa-sign-in-alt"></i>
                <span>Login</span>
            </button>
            <button class="toggle-btn" id="registerToggle" data-mode="register">
                <i class="fas fa-user-plus"></i>
                <span>Registro</span>
            </button>
        </div>

        <!-- Formulário de Login -->
        <!-- =======================================
        Bloco: Formulário de autenticação
        O que faz: Recebe credenciais do usuário existente
        Como faz: Exibe inputs validados, toggle de senha e opções extras
        ======================================= -->
        <div class="form-container active" id="loginFormContainer">
            <h2>
                <i class="fas fa-sign-in-alt"></i>
                Entrar na sua conta
            </h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">
                        <i class="fas fa-envelope"></i>
                        Email
                    </label>
                    <input type="email" id="loginEmail" name="email" placeholder="seu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="loginPassword">
                        <i class="fas fa-lock"></i>
                        Senha
                    </label>
                    <div class="password-input-wrapper">
                        <input type="password" id="loginPassword" name="password" placeholder="Digite sua senha" required>
                        <button type="button" class="password-toggle" id="loginPasswordToggle">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe">
                        <span>Lembrar-me</span>
                    </label>
                    <a href="password.html" class="forgot-link">Esqueceu a senha?</a>
                </div>

                <button type="submit" class="submit-btn">
                    <i class="fas fa-sign-in-alt"></i>
                    Entrar
                </button>
            </form>

            <div class="divider">
                <span>ou</span>
            </div>

            <div class="social-login">
                <button class="social-btn" type="button">
                    <i class="fab fa-google"></i>
                    Entrar com Google
                </button>
            </div>
        </div>

        <!-- Formulário de Registro -->
        <!-- =======================================
        Bloco: Cadastro de novos usuários
        O que faz: Coleta dados e preferências de perfil
        Como faz: Divide campos em grupos, aplica seletor de tipo e validações
        ======================================= -->
        <div class="form-container" id="registerFormContainer">
            <h2>
                <i class="fas fa-user-plus"></i>
                Criar nova conta
            </h2>

            <!-- Seleção de Tipo de Usuário -->
            <!-- =======================================
            Bloco: Selector de tipo de conta
            O que faz: Permite escolher entre paciente e responsável
            Como faz: Botões com data-type atualizam input hidden e exibem campos extras
            ======================================= -->
            <div class="user-type-selector">
                <p class="selector-label">
                    <i class="fas fa-user-tag"></i>
                    Tipo de conta:
                </p>
                <div class="type-options">
                    <div class="type-option active" data-type="user">
                        <i class="fas fa-user"></i>
                        <span>Usuário</span>
                        <small>Paciente que usará o dispositivo</small>
                    </div>
                    <div class="type-option" data-type="guardian">
                        <i class="fas fa-user-shield"></i>
                        <span>Responsável</span>
                        <small>Familiar ou cuidador</small>
                    </div>
                </div>
            </div>

            <form id="registerForm">
                <input type="hidden" id="userType" name="userType" value="user">

                <div class="form-group">
                    <label for="registerName">
                        <i class="fas fa-user"></i>
                        Nome Completo
                    </label>
                    <input type="text" id="registerName" name="name" placeholder="Seu nome completo" required>
                </div>

                <div class="form-group">
                    <label for="registerEmail">
                        <i class="fas fa-envelope"></i>
                        Email
                    </label>
                    <input type="email" id="registerEmail" name="email" placeholder="seu@email.com" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="registerPassword">
                            <i class="fas fa-lock"></i>
                            Senha
                        </label>
                        <div class="password-input-wrapper">
                            <input type="password" id="registerPassword" name="password" placeholder="Mín. 8 caracteres" required>
                            <button type="button" class="password-toggle" id="registerPasswordToggle">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="registerPasswordConfirm">
                            <i class="fas fa-lock"></i>
                            Confirmar Senha
                        </label>
                        <div class="password-input-wrapper">
                            <input type="password" id="registerPasswordConfirm" name="passwordConfirm" placeholder="Digite novamente" required>
                            <button type="button" class="password-toggle" id="registerPasswordConfirmToggle">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Campos adicionais para Responsável -->
                <!-- =======================================
                Bloco: Campos condicionais
                O que faz: Solicita telefone e relação quando o tipo é responsável
                Como faz: Div oculta via CSS/JS é exibida ao selecionar 'guardian'
                ======================================= -->
                <div class="extra-fields" id="guardianFields" style="display: none;">
                    <div class="form-group">
                        <label for="guardianPhone">
                            <i class="fas fa-phone"></i>
                            Telefone de Contato
                        </label>
                        <input type="tel" id="guardianPhone" name="phone" placeholder="(00) 00000-0000">
                    </div>
                    <div class="form-group">
                        <label for="guardianRelation">
                            <i class="fas fa-people-arrows"></i>
                            Relação com o Paciente
                        </label>
                        <select id="guardianRelation" name="relation">
                            <option value="">Selecione...</option>
                            <option value="parent">Pai/Mãe</option>
                            <option value="spouse">Cônjuge</option>
                            <option value="guardian">Tutor Legal</option>
                            <option value="relative">Familiar</option>
                            <option value="caregiver">Cuidador</option>
                            <option value="other">Outro</option>
                        </select>
                    </div>
                </div>

                <div class="terms-checkbox">
                    <label class="checkbox-label">
                        <input type="checkbox" id="acceptTerms" required>
                        <span>Eu aceito os <a href="#" target="_blank">termos de uso</a> e a <a href="#" target="_blank">política de privacidade</a></span>
                    </label>
                </div>

                <button type="submit" class="submit-btn">
                    <i class="fas fa-user-plus"></i>
                    Criar Conta
                </button>
            </form>
        </div>
    </div>

    <!-- Toast para notificações -->
    <!-- =======================================
    Bloco: Feedback visual
    O que faz: Mostra notificações de sucesso/erro
    Como faz: Usa div posicionada fixa atualizada via JS
    ======================================= -->
    <div class="toast" id="toastNotification" style="display: none;">
        <i class="fas fa-info-circle"></i>
        <span id="toastMessage">Mensagem</span>
    </div>

    <!-- =======================================
    Bloco: Scripts
    O que faz: Importa cliente da API e lógica de alternância/validações
    Como faz: Carrega primeiro api.js e depois login.js
    ======================================= -->
    <script src="../JS/api.js"></script>
    <script src="../JS/login.js"></script>

</body>
</html>
